<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI vs 사람 블라인드 테스트 | KFI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Pretendard Variable', -apple-system, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const B="#1975BC",BD="#135A91",BL="#E8F1F8",GRN="#2E8B57",ORG="#E07030",RED="#D94040",DT="#1E1E1E",TM="#444",TL="#888";

const QUESTIONS = [
  { q:"탄산음료에 사용 가능한 천연 감미료 3가지를 추천해줘.",
    answers:[
      { text:"스테비올배당체(스테비아), 알룰로스, 에리스리톨이 대표적입니다. 스테비아는 설탕의 200~300배 감미도를 가지며 칼로리가 거의 없고, 알룰로스는 설탕의 70% 감미도에 칼로리가 낮아 최근 제로 음료에 많이 활용됩니다. 에리스리톨은 청량감이 있어 탄산음료와 궁합이 좋습니다.", source:"AI", note:"정확한 정보지만 식품공전 사용기준 수치는 언급하지 않음" },
      { text:"현업에서 가장 많이 쓰는 조합은 스테비아+에리스리톨 블렌드입니다. 스테비아 단독 사용 시 뒤끝이 쓴맛이 있어서 에리스리톨이나 알룰로스로 바디감을 보완하는 게 일반적이에요. 요즘 제로 탄산 트렌드에서는 알룰로스 단독 사용도 늘고 있습니다. 다만 원가가 kg당 8,000~10,000원 수준이라 설탕(1,200원) 대비 부담이 큽니다.", source:"human", note:"실무 경험 기반 — 맛 프로파일과 원가까지 언급" },
    ]},
  { q:"식품표시광고법에서 '무설탕' 표시 기준이 뭐야?",
    answers:[
      { text:"식품등의 표시·광고에 관한 법률 시행규칙에 따르면, '무설탕'은 식품 100g당 설탕 0.5g 미만일 때 표시할 수 있습니다. 이때 '설탕'은 자당(sucrose)만을 의미하며, 다른 당류(포도당, 과당 등)는 포함되지 않습니다.", source:"AI", note:"수치(0.5g)가 정확한지 식품등의 표시기준에서 확인 필요" },
      { text:"'무설탕'은 당류 0.5g/100g 미만이면 가능합니다. 근데 실무에서 주의할 점이 있는데, '무설탕'이라고 해도 당알코올이나 알룰로스가 들어가면 소비자 민원이 자주 들어와요. 법적으론 문제없지만 '설탕 대신 다른 감미료 사용'이라는 부연을 넣는 게 안전합니다. 식약처 사전심의 통해 문구 확인하는 게 제일 확실해요.", source:"human", note:"법적 기준 + 실무 민원 경험 포함" },
    ]},
  { q:"유통기한과 소비기한의 차이를 설명해줘.",
    answers:[
      { text:"유통기한은 제품이 유통 가능한 기한이고, 소비기한은 소비자가 안전하게 섭취할 수 있는 기한입니다. 2023년 1월 1일부터 한국은 유통기한에서 소비기한 표시제로 전환했습니다. 소비기한은 보통 유통기한보다 길며, 식품의 안전성을 기준으로 설정됩니다.", source:"AI", note:"전환 시점은 정확하지만, 우유류 예외 등 세부사항 누락" },
      { text:"소비기한 전환은 2023년 1월부터 시행됐는데, 우유류는 2031년까지 유예기간이 있어요. 실무적으로 가장 큰 변화는 기한 산출 방식인데, 유통기한은 품질 변화 시점의 60~70%로 잡았다면, 소비기한은 80~90%까지 가능해서 실질적으로 기한이 늘어납니다. 다만 냉장 유통이 확실하지 않은 영세 매장에서는 리스크가 있다는 게 업계 의견이에요.", source:"human", note:"유예 기간, 산출 비율, 업계 우려까지 포함" },
    ]},
  { q:"HACCP에서 CCP(중요관리점)를 설정하는 기준은?",
    answers:[
      { text:"HACCP 7원칙 중 원칙2에 해당합니다. CCP는 위해요소를 예방, 제거 또는 허용 수준으로 감소시킬 수 있는 공정 단계입니다. CCP 결정도(Decision Tree)를 사용하여 각 공정 단계에서 위해요소 관리가 필수적인 지점을 식별합니다. 일반적으로 가열살균, 금속검출, 냉각 공정 등이 CCP로 설정됩니다.", source:"human", note:"교과서적이지만 사람도 이렇게 정확하게 답할 수 있음" },
      { text:"CCP 설정은 Codex의 Decision Tree(판단 도표)를 따릅니다. 각 공정 단계마다 4가지 질문을 순서대로 적용하는데: Q1) 이 단계에 예방 조치가 있는가? Q2) 이 단계가 위해를 허용 수준으로 감소시키는가? Q3) 오염이 허용 수준을 초과할 수 있는가? Q4) 후속 단계가 위해를 제거할 수 있는가? 이 판단 흐름을 따라 YES/NO로 분기하면 CCP 여부가 결정됩니다.", source:"AI", note:"체계적이지만 실제 현장 적용 사례가 없음" },
    ]},
  { q:"음료 제품의 Brix를 측정하는 방법은?",
    answers:[
      { text:"Brix 측정은 굴절계(Refractometer)를 사용합니다. 디지털 굴절계에 시료 몇 방울을 올리면 자동으로 Brix 값을 표시합니다. 측정 전 증류수로 영점 교정(0°Bx)을 하고, 시료 온도는 20°C가 표준입니다. 탄산음료의 경우 CO₂ 기포가 측정에 영향을 줄 수 있으므로 탈기 후 측정합니다.", source:"AI", note:"원리와 절차가 정확하나 현장 노하우 부족" },
      { text:"현장에서는 ATAGO 디지털 굴절계를 제일 많이 써요. PAL-1 모델이 범용이고, 탄산은 PAL-BX|ACID로 산도까지 동시에 봅니다. 주의할 점은 탄산 제품은 반드시 교반해서 가스 빼고 재야 해요. 안 그러면 실제보다 0.3~0.5 정도 높게 나옵니다. 온도 보정은 장비가 자동으로 하지만, 여름철 30°C 넘으면 수동 보정 체크하는 게 좋아요.", source:"human", note:"특정 장비명, 오차 범위, 계절 팁까지 — 전형적 현장 지식" },
    ]},
  { q:"프로바이오틱스 음료 개발 시 주의할 점은?",
    answers:[
      { text:"프로바이오틱스 음료는 균주 안정성이 핵심입니다. pH 4.0 이하에서는 유산균 생존율이 급격히 떨어지므로, pH 4.0~4.5 범위를 유지하는 것이 좋습니다. 또한 열처리 공정 후 균주를 투입해야 하며, 유통기한 종료 시점까지 표시 균수(CFU)를 보장해야 합니다. 보호제로는 트레할로스, 말토덱스트린 등이 사용됩니다.", source:"AI", note:"교과서적으로 정확한 내용" },
      { text:"프로바이오틱스 음료 제일 큰 실패 요인이 유통 중 균수 감소예요. 저희 경험상 제조 시점에 표시 균수의 3~5배를 넣어야 유통기한 끝까지 보장됩니다. pH는 4.2 전후가 최적이고, 구연산보다 젖산으로 pH 조정하는 게 유산균 생존에 유리해요. 그리고 의외로 큰 변수가 포장재인데, PET보다 유리병이 산소 차단이 좋아서 균 생존율이 20~30% 높습니다.", source:"human", note:"배수 투입량, 산미료 선택, 포장재 비교 — 실무 노하우" },
    ]},
];

function App() {
  const [idx, setIdx] = React.useState(0);
  const [choice, setChoice] = React.useState(null);
  const [score, setScore] = React.useState({ correct:0, total:0 });
  const [done, setDone] = React.useState(false);
  const [shuffled, setShuffled] = React.useState(() => QUESTIONS.map(q => {
    const swap = Math.random() > 0.5;
    return { ...q, display: swap ? [q.answers[1], q.answers[0]] : [...q.answers] };
  }));

  const cur = shuffled[idx];

  const handleChoice = (i) => {
    if (choice !== null) return;
    setChoice(i);
    const isAI = cur.display[i].source === "AI";
    // User guesses which is AI
    setScore(s => ({ correct: s.correct + (isAI ? 1 : 0), total: s.total + 1 }));
  };

  const next = () => {
    if (idx < shuffled.length - 1) { setIdx(i=>i+1); setChoice(null); }
    else setDone(true);
  };

  if (done) {
    const pct = Math.round((score.correct/score.total)*100);
    return (
      <div style={{ minHeight:"100vh", background:"#FAF8F5", fontFamily:"'Pretendard Variable',-apple-system,sans-serif" }}>
        <style>{`@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');*{margin:0;padding:0;box-sizing:border-box;}`}</style>
        <div style={{ background:`linear-gradient(135deg,${B},${BD})`, padding:"14px 24px" }}>
          <div style={{ maxWidth:800, margin:"0 auto", display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ background:"rgba(255,255,255,0.15)", borderRadius:6, padding:"3px 12px", fontWeight:800, fontSize:12, color:"#fff", letterSpacing:1 }}>KFI</span>
            <span style={{ color:"#fff", fontSize:13, opacity:0.9 }}>AI vs 사람 블라인드 테스트</span>
          </div>
        </div>
        <div style={{ maxWidth:600, margin:"60px auto", textAlign:"center", padding:"0 24px" }}>
          <div style={{ fontSize:60, marginBottom:16 }}>{pct >= 80 ? "🎯" : pct >= 50 ? "🤔" : "😮"}</div>
          <h1 style={{ fontSize:28, fontWeight:800, color:DT, marginBottom:8 }}>테스트 완료!</h1>
          <p style={{ fontSize:16, color:TM, marginBottom:24 }}>{QUESTIONS.length}문제 중 <strong style={{ color:B, fontSize:22 }}>{score.correct}</strong>문제 정답 ({pct}%)</p>
          <div style={{ width:160, height:160, borderRadius:"50%", background:`conic-gradient(${B} ${pct}%, #E8E4E0 ${pct}%)`, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 24px" }}>
            <div style={{ width:130, height:130, borderRadius:"50%", background:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:28, fontWeight:800, color:B }}>{pct}%</div>
          </div>
          <p style={{ fontSize:14.5, color:TM, lineHeight:1.7, marginBottom:24 }}>
            {pct >= 80 ? "탁월합니다! AI와 사람의 답변을 정확하게 구분하고 있습니다." :
             pct >= 50 ? "꽤 잘하셨습니다! AI가 점점 사람처럼 답변하고 있어서 구분이 쉽지 않죠." :
             "AI의 답변이 매우 정교해졌다는 증거입니다. 이래서 교차 검증이 필수입니다!"}
          </p>
          <div style={{ background:BL, borderRadius:12, padding:18, textAlign:"left", marginBottom:20 }}>
            <p style={{ fontSize:13, fontWeight:700, color:B, marginBottom:6 }}>💡 AI vs 사람 답변 구분 TIP</p>
            <p style={{ fontSize:13, color:TM, lineHeight:1.6 }}>
              • 사람: 특정 브랜드/장비명, 원가 수치, 실패 경험 언급<br/>
              • AI: 체계적 나열, 교과서적 정확성, 실무 디테일 부족<br/>
              • 핵심: AI가 '정확해 보이는' 답변을 해도 반드시 검증 필요
            </p>
          </div>
          <button onClick={() => { setIdx(0); setChoice(null); setScore({correct:0,total:0}); setDone(false); setShuffled(QUESTIONS.map(q => { const sw=Math.random()>0.5; return {...q, display:sw?[q.answers[1],q.answers[0]]:[...q.answers]}; })); }}
            style={{ padding:"12px 28px", borderRadius:10, border:"none", background:B, color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer" }}>다시 도전</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:"#FAF8F5", fontFamily:"'Pretendard Variable',-apple-system,sans-serif" }}>
      <style>{`
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        *{margin:0;padding:0;box-sizing:border-box;}
      `}</style>

      <div style={{ background:`linear-gradient(135deg,${B},${BD})`, padding:"14px 24px" }}>
        <div style={{ maxWidth:800, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ background:"rgba(255,255,255,0.15)", borderRadius:6, padding:"3px 12px", fontWeight:800, fontSize:12, color:"#fff", letterSpacing:1 }}>KFI</span>
            <span style={{ color:"#fff", fontSize:13, opacity:0.9 }}>AI vs 사람 블라인드 테스트</span>
          </div>
          <span style={{ color:"#fff", fontSize:12, opacity:0.7 }}>🎯 {score.correct}/{score.total} 정답</span>
        </div>
      </div>
      {/* Progress */}
      <div style={{ background:"#E8E4E0", height:3 }}>
        <div style={{ background:B, height:3, width:`${((idx+1)/QUESTIONS.length)*100}%`, transition:"width 0.5s" }} />
      </div>

      <div style={{ maxWidth:800, margin:"0 auto", padding:"28px 24px 60px" }}>
        <p style={{ fontSize:13, color:TL, marginBottom:6 }}>Q{idx+1} / {QUESTIONS.length}</p>
        <div style={{ background:"#fff", border:"1px solid #E0E0E0", borderRadius:14, padding:22, marginBottom:20, boxShadow:"0 4px 16px rgba(0,0,0,0.04)" }}>
          <p style={{ fontSize:16, fontWeight:700, color:DT, lineHeight:1.5, marginBottom:4 }}>{cur.q}</p>
          <p style={{ fontSize:13, color:B, fontWeight:600 }}>아래 두 답변 중 AI가 작성한 것을 골라주세요!</p>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 }} key={idx}>
          {cur.display.map((ans, i) => {
            let borderCol = "#E0E0E0", bg = "#fff", label = "";
            if (choice !== null) {
              if (ans.source === "AI") { borderCol = RED; bg = "#FFF5F5"; label = "🤖 AI"; }
              else { borderCol = GRN; bg = "#F0FFF5"; label = "👤 사람"; }
            }
            return (
              <div key={i} onClick={() => handleChoice(i)} style={{
                background:bg, border:`2px solid ${borderCol}`, borderRadius:14, padding:20,
                cursor: choice !== null ? "default" : "pointer",
                transition:"all 0.2s", animation:"fadeUp 0.4s ease",
                transform: choice === null ? undefined : undefined,
                opacity: choice !== null && choice !== i && cur.display[i].source !== "AI" ? 0.7 : 1
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                  <span style={{ fontSize:14, fontWeight:700, color:DT }}>답변 {String.fromCharCode(65+i)}</span>
                  {choice !== null && <span style={{ fontSize:12, fontWeight:700, color: ans.source==="AI" ? RED : GRN }}>{label}</span>}
                </div>
                <p style={{ fontSize:13.5, color:TM, lineHeight:1.65 }}>{ans.text}</p>
                {choice !== null && (
                  <div style={{ marginTop:10, padding:"8px 12px", background: ans.source==="AI" ? "#FFF0F0" : "#F0FFF5", borderRadius:8, fontSize:12, color:TM }}>
                    💡 {ans.note}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {choice !== null && (
          <div style={{ textAlign:"center", animation:"fadeUp 0.3s ease" }}>
            <p style={{ fontSize:15, fontWeight:700, color: cur.display[choice].source==="AI" ? GRN : RED, marginBottom:12 }}>
              {cur.display[choice].source === "AI" ? "✅ 정답! AI 답변을 정확히 찾았습니다." : "❌ 아쉽습니다! 사람의 답변이었어요."}
            </p>
            <button onClick={next} style={{
              padding:"12px 28px", borderRadius:10, border:"none",
              background:B, color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer"
            }}>{idx < QUESTIONS.length-1 ? "다음 문제 →" : "결과 보기 →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
