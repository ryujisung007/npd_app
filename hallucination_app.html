function Header({ currentSection }) {

          <span style={{ background: "rgba(255,255,255,0.15)", border: "1px solid rgba(255,255,255,0.25)", borderRadius: 6, padding: "3px 12px", fontWeight: 800, fontSize: 12, letterSpacing: 1 }}>KFI</span>

}

function ProgressBar({ current, total }) {
  return (
    <div style={{ background: "#E8E4E0", height: 3 }}>
      <div style={{ background: B, height: 3, width: `${((current + 1) / total) * 100}%`, transition: "width 0.5s ease", borderRadius: "0 2px 2px 0" }} />
    </div>
  );
}

function SectionWrapper({ children, style }) {
  return <div style={{ maxWidth: 900, margin: "0 auto", padding: "36px 24px", ...style }}>{children}</div>;
}

function SectionTitle({ color, children }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 22 }}>
      <div style={{ width: 5, height: 28, borderRadius: 3, background: color, flexShrink: 0 }} />
      <h2 style={{ fontSize: 22, fontWeight: 800, color: DT, margin: 0 }}>{children}</h2>
    </div>
  );
}

function Card({ icon, title, children, style }) {
  const [hov, setHov] = React.useState(false);
  return (
    <div
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background: "#F2F8F4", border: "1px solid #C8DED0", borderRadius: 12,
        padding: "22px 22px 20px", position: "relative", overflow: "hidden",
        transform: hov ? "translateY(-2px)" : "none",
        boxShadow: hov ? "0 6px 20px rgba(0,0,0,0.08)" : "none",
        transition: "all 0.2s", ...style
      }}>
      <div style={{ position: "absolute", bottom: 0, left: 20, right: 20, height: 3, background: GRN, borderRadius: "2px 2px 0 0" }} />
      <div style={{ fontSize: 22, marginBottom: 6 }}>{icon}</div>
      <div style={{ fontSize: 16, fontWeight: 700, color: DT, marginBottom: 10 }}>{title}</div>
      <div style={{ fontSize: 14.5, color: TM, lineHeight: 1.7 }}>{children}</div>
    </div>
  );
}

function NavButtons({ onPrev, onNext, prevLabel, nextLabel, disablePrev, disableNext }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", marginTop: 32 }}>
      <button onClick={onPrev} disabled={disablePrev} style={{
        padding: "10px 24px", borderRadius: 8, border: `1px solid ${disablePrev ? "#ddd" : B}`,
        background: "transparent", color: disablePrev ? "#ccc" : B, fontSize: 14, fontWeight: 600,
        cursor: disablePrev ? "default" : "pointer", transition: "all 0.2s"
      }}>← {prevLabel || "이전"}</button>
      <button onClick={onNext} disabled={disableNext} style={{
        padding: "10px 24px", borderRadius: 8, border: "none",
        background: disableNext ? "#ccc" : B, color: "#fff", fontSize: 14, fontWeight: 600,
        cursor: disableNext ? "default" : "pointer", transition: "all 0.2s"
      }}>{nextLabel || "다음"} →</button>
    </div>
  );
}

          <div key={i} style={{ background: st.bg, border: `1px solid ${st.border}`, borderRadius: 12, padding: "20px 18px", position: "relative", transition: "transform 0.2s" }}>
            <span style={{ display: "inline-block", padding: "3px 11px", borderRadius: 4, fontSize: 10, fontWeight: 800, color: "#fff", background: st.color, letterSpacing: 0.5, marginBottom: 10 }}>{st.num}</span>
            <div style={{ position: "absolute", top: 16, right: 16, fontSize: 24, opacity: 0.6 }}>{st.icon}</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: st.color, marginBottom: 12 }}>{st.title}</div>
            <div style={{ fontSize: 14, color: TM, lineHeight: 1.65 }}>{st.body}</div>
          </div>
        ))}
      </div>
      <div style={{ background: BL, border: "1px solid #C0D8EC", borderRadius: 12, padding: "16px 22px", display: "flex", alignItems: "center", gap: 12 }}>
        <span style={{ fontSize: 24, flexShrink: 0 }}>🛡️</span>
        <p style={{ fontSize: 14.5, color: DT, lineHeight: 1.6, margin: 0 }}>
          <strong style={{ color: B }}>기억하세요!</strong>&nbsp;&nbsp;AI는 보조 도구입니다. 최종 판단은 반드시 공인된 데이터베이스와 법령 원문으로 검증하세요.
        </p>
      </div>
    </SectionWrapper>
  );
}

function S3_Simulator() {
  const [selected, setSelected] = React.useState(0);
  const [mode, setMode] = React.useState("bad"); // bad | good
  const [revealed, setRevealed] = React.useState(false);
  const sc = SCENARIOS[selected];

  const switchScenario = (i) => { setSelected(i); setRevealed(false); setMode("bad"); };

  return (
    <SectionWrapper>
      <SectionTitle color={BM}>프롬프트 시뮬레이터</SectionTitle>
      <p style={{ fontSize: 14.5, color: TM, marginBottom: 20, lineHeight: 1.7 }}>
        같은 질문이라도 <strong>프롬프트 작성 방법</strong>에 따라 AI 답변의 신뢰도가 달라집니다. 시나리오를 선택하고 비교해보세요.
      </p>

      {/* Scenario tabs */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {SCENARIOS.map((s, i) => (
          <button key={i} onClick={() => switchScenario(i)} style={{
            padding: "8px 16px", borderRadius: 8, border: `1.5px solid ${selected === i ? B : "#ddd"}`,
            background: selected === i ? BL : "#fff", color: selected === i ? B : TM,
            fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.2s"
          }}>
            {s.label}
          </button>
        ))}
      </div>

      {/* Toggle */}
      <div style={{ display: "flex", marginBottom: 16, background: "#F0F0F0", borderRadius: 10, padding: 3, width: "fit-content" }}>
        {[["bad", "❌ 나쁜 프롬프트"], ["good", "✅ 좋은 프롬프트"]].map(([m, label]) => (
          <button key={m} onClick={() => { setMode(m); setRevealed(false); }} style={{
            padding: "8px 20px", borderRadius: 8, border: "none",
            background: mode === m ? (m === "bad" ? RED : GRN) : "transparent",
            color: mode === m ? "#fff" : TM, fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.2s"
          }}>{label}</button>
        ))}
      </div>

      {/* Chat simulation */}
      <div style={{ background: "#fff", border: "1px solid #E0E0E0", borderRadius: 14, overflow: "hidden", boxShadow: "0 4px 16px rgba(0,0,0,0.06)" }}>
        {/* Chat header */}
        <div style={{ background: B, padding: "12px 20px", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 32, height: 32, borderRadius: "50%", background: "rgba(255,255,255,0.15)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🤖</div>
          <span style={{ color: "#fff", fontWeight: 600, fontSize: 14 }}>AI 식품 R&D 어시스턴트</span>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#4ADE80" }} />
            <span style={{ color: "rgba(255,255,255,0.6)", fontSize: 11 }}>온라인</span>
          </div>
        </div>

        <div style={{ padding: 20, minHeight: 200 }}>
          {/* User message */}
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
            <div style={{ maxWidth: "85%", background: mode === "bad" ? "#FFF0F0" : "#F0FFF5", border: `1px solid ${mode === "bad" ? "#F0D0D0" : "#C0E8D0"}`, borderRadius: "14px 14px 4px 14px", padding: "12px 16px" }}>
              <div style={{ fontSize: 14, color: DT, lineHeight: 1.6 }}>{mode === "bad" ? sc.badPrompt : sc.goodPrompt}</div>
            </div>
          </div>

          {/* AI response */}
          {!revealed ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 20 }}>
              <button onClick={() => setRevealed(true)} style={{
                padding: "12px 28px", borderRadius: 10, border: "none",
                background: `linear-gradient(135deg, ${B}, ${BM})`, color: "#fff",
                fontSize: 14, fontWeight: 700, cursor: "pointer",
                boxShadow: "0 4px 16px rgba(25,117,188,0.3)", transition: "transform 0.1s"
              }}>
                🔍 AI 답변 확인하기
              </button>
            </div>
          ) : (
            <div style={{ animation: "fadeUp 0.4s ease" }}>
              <div style={{ display: "flex", marginBottom: 10 }}>
                <div style={{ maxWidth: "85%", background: "#F5F5F5", borderRadius: "14px 14px 14px 4px", padding: "12px 16px" }}>
                  <div style={{ fontSize: 14, color: mode === "bad" ? RED : GRN, lineHeight: 1.6 }}>
                    {mode === "bad" ? sc.badAnswer : sc.goodAnswer}
                  </div>
                </div>
              </div>
              <div style={{
                background: mode === "bad" ? "#FFF5F5" : "#F0FFF5",
                border: `1px solid ${mode === "bad" ? "#F0D0D0" : "#C0E8D0"}`,
                borderRadius: 8, padding: "10px 14px", fontSize: 13, fontWeight: 600, color: TM
              }}>
                {mode === "bad" ? sc.badNote : sc.goodNote}
              </div>
            </div>
          )}
        </div>
      </div>
    </SectionWrapper>
  );
}

function S4_Quiz() {
  const [current, setCurrent] = React.useState(0);
  const [chosen, setChosen] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [done, setDone] = React.useState(false);

  const q = QUIZ[current];

  const handleChoice = (i) => {
    if (chosen !== null) return;
    setChosen(i);
    if (i === q.answer) setScore(s => s + 1);
  };

  const handleNext = () => {
    if (current < QUIZ.length - 1) { setCurrent(c => c + 1); setChosen(null); }
    else setDone(true);
  };

  if (done) {
    const pct = Math.round((score / QUIZ.length) * 100);
    return (
      <SectionWrapper>
        <div style={{ textAlign: "center", padding: "48px 20px" }}>
          <div style={{ fontSize: 56, marginBottom: 16 }}>{pct >= 80 ? "🎉" : pct >= 50 ? "👍" : "📚"}</div>
          <h2 style={{ fontSize: 28, fontWeight: 800, color: DT, marginBottom: 8 }}>퀴즈 완료!</h2>
          <p style={{ fontSize: 18, color: TM, marginBottom: 24 }}>
            {QUIZ.length}문제 중 <strong style={{ color: B, fontSize: 24 }}>{score}</strong>문제 정답
          </p>
          <div style={{ width: 200, height: 200, borderRadius: "50%", background: `conic-gradient(${B} ${pct}%, #E8E4E0 ${pct}%)`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 24px" }}>
            <div style={{ width: 160, height: 160, borderRadius: "50%", background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32, fontWeight: 800, color: B }}>{pct}%</div>
          </div>
          <p style={{ fontSize: 14.5, color: TM, lineHeight: 1.7 }}>
            {pct >= 80 ? "훌륭합니다! 할루시네이션의 위험성과 방지 방법을 잘 이해하고 있습니다." :
             pct >= 50 ? "좋은 시작입니다! 위의 교안을 다시 한번 복습해보세요." :
             "교안 내용을 다시 한번 꼼꼼히 읽어보시길 추천합니다."}
          </p>
          <button onClick={() => { setCurrent(0); setChosen(null); setScore(0); setDone(false); }} style={{
            marginTop: 20, padding: "10px 24px", borderRadius: 8, border: "none",
            background: B, color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer"
          }}>다시 풀기</button>
        </div>
      </SectionWrapper>
    );
  }

  return (
    <SectionWrapper>
      <SectionTitle color={B}>퀴즈로 확인하기</SectionTitle>
      <p style={{ fontSize: 13, color: TL, marginBottom: 20 }}>문제 {current + 1} / {QUIZ.length}</p>

      <div style={{ background: "#fff", border: "1px solid #E0E0E0", borderRadius: 14, padding: 24, boxShadow: "0 4px 16px rgba(0,0,0,0.05)" }}>
        <p style={{ fontSize: 17, fontWeight: 700, color: DT, marginBottom: 20, lineHeight: 1.5 }}>{q.q}</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {q.options.map((opt, i) => {
            let bg = "#FAFAFA", border = "#E0E0E0", col = DT;
            if (chosen !== null) {
              if (i === q.answer) { bg = "#F0FFF5"; border = GRN; col = GRN; }
              else if (i === chosen && i !== q.answer) { bg = "#FFF5F5"; border = RED; col = RED; }
            }
            return (
              <button key={i} onClick={() => handleChoice(i)} style={{
                padding: "14px 18px", borderRadius: 10, border: `1.5px solid ${border}`,
                background: bg, color: col, fontSize: 14.5, fontWeight: 600, textAlign: "left",
                cursor: chosen !== null ? "default" : "pointer", transition: "all 0.2s",
                display: "flex", alignItems: "center", gap: 10
              }}>
                <span style={{ width: 28, height: 28, borderRadius: "50%", background: chosen !== null && i === q.answer ? GRN : chosen === i && i !== q.answer ? RED : "#E8E4E0", color: chosen !== null && (i === q.answer || i === chosen) ? "#fff" : TM, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, flexShrink: 0 }}>
                  {chosen !== null && i === q.answer ? "✓" : chosen === i && i !== q.answer ? "✗" : String.fromCharCode(65 + i)}
                </span>
                {opt}
              </button>
            );
          })}
        </div>

        {chosen !== null && (
          <div style={{ marginTop: 16, padding: "14px 18px", background: BL, borderRadius: 10, fontSize: 14, color: DT, lineHeight: 1.6, animation: "fadeUp 0.3s ease" }}>
            <strong style={{ color: B }}>해설</strong>&nbsp;&nbsp;{q.explain}
          </div>
        )}

        {chosen !== null && (
          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 16 }}>
            <button onClick={handleNext} style={{
              padding: "10px 24px", borderRadius: 8, border: "none",
              background: B, color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer"
            }}>{current < QUIZ.length - 1 ? "다음 문제 →" : "결과 보기 →"}</button>
          </div>
        )}
      </div>
    </SectionWrapper>
  );
}

// ─── Main App ───
function App() {
  const [section, setSection] = React.useState(0);
  const total = 5;

  const sections = [S0_Overview, S1_Examples, S2_Checklist, S3_Simulator, S4_Quiz];
  const Current = sections[section];

  return (
    <div style={{ minHeight: "100vh", background: "#FAF8F5", fontFamily: "'Pretendard Variable', -apple-system, sans-serif" }}>
      <style>{`
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        * { margin:0; padding:0; box-sizing:border-box; }
        button:hover { opacity: 0.92; }
        @media (max-width: 680px) {
          .grid-2 { grid-template-columns: 1fr !important; }
          .grid-3 { grid-template-columns: 1fr !important; }
        }
      `}</style>

      <Header currentSection={section} />
      <ProgressBar current={section} total={total} />

      <div key={section} style={{ animation: "fadeUp 0.4s ease" }}>
        <Current />
      </div>

      <SectionWrapper>
        <NavButtons
          onPrev={() => setSection(s => s - 1)}
          onNext={() => setSection(s => s + 1)}
          prevLabel={section > 0 ? ["개요","사례","체크리스트","시뮬레이터","퀴즈"][section - 1] : ""}
          nextLabel={section < total - 1 ? ["개요","사례","체크리스트","시뮬레이터","퀴즈"][section + 1] : ""}
          disablePrev={section === 0}
          disableNext={section === total - 1}
        />
      </SectionWrapper>

      <div style={{ background: BD, color: "rgba(255,255,255,0.6)", padding: "16px 24px", textAlign: "center", fontSize: 12, marginTop: 32 }}>
        <strong style={{ color: "rgba(255,255,255,0.85)" }}>한국식품정보원 (KFI)</strong> &nbsp;|&nbsp; AI 활용 식품개발 실무 교안 &nbsp;|&nbsp; 식품전공 학생 대상
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
